      --sticker-shadow: 0 8px 18px rgba(0,0,0,.12);
      --radius: 12px;
      --gap: 14px;
    }

    * { box-sizing: border-box; }

html {
      height: 100%;
    }

    body {
      min-height: 100%; /* Позволяет фону расти вместе с контентом */
      margin: 0;
      font-family: "M PLUS Rounded 1c", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: #f6f0e5;
      color: var(--ink);
    }

    /* Фон: текстура бумаги (tone-down) */
    body {
      background-image:
        linear-gradient(135deg, rgba(255,255,255,.25) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(0,0,0,.02), rgba(0,0,0,.02)),
        url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">\
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">\

  </pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/>\
</svg>');
      background-blend-mode: normal;
      background-size: auto; /* Клеточка будет бесконечно повторяться вниз, не искажаясь */

    /* Навигационная панель: прогресс и фильтры */
    .top-bar {

      top: 12px;
      left: 50%;
      transform: translateX(-50%);

      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      backdrop-filter: saturate(1.2) blur(2px);
      border: 1px solid rgba(0,0,0,.05);
    }

    .badge {
      font-family: "Marck Script", cursive;
      font-size: 18px;
      color: #6b4c2f;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e5d9c4;

      border: none;
      background: transparent;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      color: #5b4334;
      font-weight: 600;
      transition: transform .2s ease;
    }

      background: #f0e3d1;
      box-shadow: inset 0 0 0 2px #e9d2b0;
    }
    .filter-btn:hover { transform: translateY(-1px); }

    /* Контейнер стикеров */
    .board {
      padding: 110px 20px 110px; /* 110px сверху, 20px по бокам, 110px снизу */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 22px;
      width: min(1200px, 92%);
      margin: 0 auto;
      perspective: 1000px; /* для 3D flip */
    }

    /* Стикер: карточка-бумажка */
    .sticker {
      width: 100%;
      height: 170px;
      border-radius: 14px;
      position: relative;
      transform: rotate(var(--angle, 2deg));
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.2,.8,.2,1);
      box-shadow: var(--shadow, 0 8px 18px rgba(0,0,0,.12));
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      border: 1px solid rgba(0,0,0,.05);
    }

    .sticker.yellow    { background: #fff3c4; }
    .sticker.pink      { background: #ffd8e9; }
    .sticker.mint      { background: #d6f7e3; }
    .sticker.blue      { background: #d8e7ff; }

    /* Обратная сторона стикера (flip) */
    .sticker-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%; 
      height: 100%;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.2,.8,.2,1);
    }

    .sticker:hover {
      transform: rotate(var(--angle, 2deg)) scale(1.02);
    }

    .sticker.is-open {
      opacity: 0.9;
    }

    .sticker .front, .sticker .back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%; 
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      padding: 14px; /* Внутренние отступы теперь здесь */
    }

    .sticker .front {
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 28px;
      font-family: "Marck Script", cursive;
      color: #5a3c2f;
    }

    .sticker .back {
      transform: rotateY(180deg);
      display: flex; 
      flex-direction: column; 
      gap: 6px;
      align-items: center; 
      justify-content: center;
      text-align: center;
      font-family: "Caveat", cursive;
      font-size: 18px;
      color: #3b2f2f;
    }

    .back .img {
      width: 58px; 
      height: 58px;
      border-radius: 6px;
      background: #eee;
      display: inline-block;
      border: 1px solid #ddd;
      
      /* Инструменты автоматической подгонки размера: */
      background-size: cover;       /* Автоматически масштабирует фото, заполняя весь квадрат */
      background-position: center;  /* Центрирует изображение, срезая лишние края по бокам */

    /* Галочка для открытых стикеров */
    .sticker.opened::after {
      content: "✓";
      position: absolute;
      top: 6px; 
      left: 6px;
      background: rgba(0,0,0,.08);
      color: #256a2c;

      place-items: center;
      border-radius: 6px;
      font-weight: 700;
      font-family: monospace;
      font-size: 14px;
      z-index: 10;
    }

    .fade-out { animation: fadeOut .4s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(.96); } }

      .sticker { height: 150px; }
      .sticker .front { font-size: 24px; }
      .sticker .back { font-size: 16px; }
    }
  </style>

      const back = document.createElement('div');
      back.className = 'back';
      
      const imgEl = document.createElement('div');
      imgEl.className = 'img';
      
      // Динамически собираем путь: images/1.jpg, images/2.jpg и т.д.
      // Используем расширение в нижнем регистре (.jpg)
      const imagePath = `images/${item.id}.jpg`; 
      
      imgEl.style.backgroundImage = `url(${imagePath})`;
      imgEl.style.backgroundSize = 'cover';
      imgEl.style.backgroundPosition = 'center';
      
      const t = document.createElement('div');
      t.textContent = item.text;
      t.style.fontWeight = '600';
      
      const small = document.createElement('div');
      small.textContent = 'история #' + item.id;
      small.style.fontSize = '12px';
      small.style.color = '#555';

      back.appendChild(imgEl);
      back.appendChild(t);
      back.appendChild(small);

      inner.appendChild(front);
      inner.appendChild(back);
      sticker.appendChild(inner);

      let flipped = false;
      sticker.addEventListener('click', () => {
        flipped = !flipped;
        inner.style.transform = 'rotateY(' + (flipped ? 180 : 0) + 'deg)';
        
        if (flipped && !openedSet.has(item.id)) {
          openedSet.add(item.id);
          sticker.classList.add('opened');
          saveOpened();
          updateProgress();
        }
        if (openedSet.has(item.id)) {
          sticker.classList.add('opened');
        }
      });

      if (openedSet.has(item.id)) {
        sticker.classList.add('opened');
        inner.style.transform = 'rotateY(180deg)';
        flipped = true;
      }

      return sticker;
    }

    // 4) Обновление прогресса
    function updateProgress() {
      const openedCount = openedSet.size;
      const total = fullReasons.length;
      const progressText = document.getElementById('progressText');
      progressText.textContent = `Открыто причин: ${openedCount} из ${total}`;
    }

    // 5) Функция рендера с учётом фильтра
    function renderBoard() {
      board.innerHTML = '';
      const toShow = fullReasons.filter(r => {
        if (!activeTag) return true;
        return r.tag === activeTag;
      });

      toShow.forEach(it => {
        const el = createSticker(it);
        board.appendChild(el);
      });
      
      if (toShow.length === 0) {
        const msg = document.createElement('div');
        msg.textContent = 'Нет стикеров с выбранным тегом. Попробуйте другой тег.';
        msg.style.opacity = .7;
        msg.style.gridColumn = '1 / -1';
        board.appendChild(msg);
      }
    }

    // 6) Инициализация тег-панели
    function renderFilters() {
      filterBar.innerHTML = '';
      const btnAll = document.createElement('button');
      btnAll.className = 'filter-btn' + (activeTag === null ? ' active' : '');
      btnAll.textContent = 'Все';
      btnAll.addEventListener('click', () => {
        activeTag = null;
        renderFilters();
        renderBoard();
      });
      filterBar.appendChild(btnAll);

      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeTag === tag ? ' active' : '');
        btn.textContent = '#' + tag;
        btn.addEventListener('click', () => {
          activeTag = tag;
          renderFilters();
          renderBoard();
        });
        filterBar.appendChild(btn);
      });
    }

    // 7) Запуск
    allTags.length = 0;
    fullReasons.forEach(r => {
      if (r.tag && !allTags.includes(r.tag)) allTags.push(r.tag);
    });

    updateProgress();
    renderFilters();
    renderBoard();
  </script>
</body>
</html>
