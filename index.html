<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>101 причина любви — Бумажная доска</title>

  <!-- Подключение Google Fonts: рукописный кириллический шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;645&family=Marck+Script&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f2e7;           /* теплая бумажная база */
      --bg-accent: #f2e5c9;
      --ink: #3b2f2f;
      --sticker-shadow: 0 8px 18px rgba(0,0,0,.12);
      --radius: 12px;
      --gap: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: "M PLUS Rounded 1c", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: #f6f0e5;
      color: var(--ink);
    }

    /* Фон: текстура бумаги (tone-down) */
    body {
      background-image:
        linear-gradient(135deg, rgba(255,255,255,.25) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(0,0,0,.02), rgba(0,0,0,.02)),
        url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">\
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">\
  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="%23d9d0c2" stroke-width="1"/>\
  </pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/>\
</svg>');
      background-blend-mode: normal;
      background-size: cover;
    }

    /* Верхняя панель: прогресс и фильтры */
    .top-bar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      backdrop-filter: saturate(1.2) blur(2px);
      border: 1px solid rgba(0,0,0,.05);
    }

    .badge {
      font-family: "Marck Script", cursive;
      font-size: 18px;
      color: #6b4c2f;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e5d9c4;
    }

    .filter-btn {
      border: none;
      background: transparent;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      color: #5b4334;
      font-weight: 600;
      transition: transform .2s ease;
    }
    .filter-btn.active {
      background: #f0e3d1;
      box-shadow: inset 0 0 0 2px #e9d2b0;
    }
    .filter-btn:hover { transform: translateY(-1px); }

    /* Контейнер стикеров: сетка или облако */
    .board {
      padding: 110px 20px 40px; /* место под верхнюю панель */
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 22px;
      width: min(1200px, 92%);
      margin: 0 auto;
      perspective: 1000px; /* для 3D flip */
    }

    /* Стикер: карточка-бумажка */
    .sticker {
      width: 100%;
      height: 170px;
      border-radius: 14px;
      padding: 14px;
      position: relative;
      transform: rotate(var(--angle, 2deg));
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.2,.8,.2,1);
      box-shadow: var(--shadow, 0 8px 18px rgba(0,0,0,.12));
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      border: 1px solid rgba(0,0,0,.05);
    }

    /* Цвета пастельных наклеек */
    .sticker.yellow    { background: #fff3c4; border-color: rgba(0,0,0,.05); }
    .sticker.pink      { background: #ffd8e9; border-color: rgba(0,0,0,.05); }
    .sticker.mint      { background: #d6f7e3; border-color: rgba(0,0,0,.05); }
    .sticker.blue      { background: #d8e7ff; border-color: rgba(0,0,0,.05); }

    /* Наклон и реалистичная тень применяются как CSS-свойства */
    .sticker .content {
      position: relative;
      z-index: 2;
      font-family: "Caveat", "Marck Script", cursive;
      font-size: 22px;
      line-height: 1.25;
      color: #3b2f2f;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }

    /* Обратная сторона стикера (flip) */
    .sticker-inner {
      position: absolute;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.2,.8,.2,1);
    }

    .sticker:hover {
      transform: rotate(var(--angle, 2deg)) scale(1.02);
    }

    .sticker.is-open {
      opacity: 0.9;
    }

    .sticker .front, .sticker .back {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
    }

    .sticker .front {
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      font-family: "Marck Script", cursive;
      color: #5a3c2f;
    }

    .sticker .back {
      transform: rotateY(180deg);
      padding: 12px;
      display: flex; flex-direction: column; gap: 6px;
      align-items: center; justify-content: center;
      text-align: center;
      font-family: "Caveat", cursive;
      font-size: 18px;
      color: #3b2f2f;
    }

    .back .img {
      width: 58px; height: 58px;
      border-radius: 6px;
      background: #eee;
      display: inline-block;
      object-fit: cover;
      border: 1px solid #ddd;
    }

    /* Галочка для открытых стикеров */
    .sticker.opened {
      position: relative;
      /* пометка открытости: галочка сверху слева */
    }
    .sticker.opened::after {
      content: "✓";
      position: absolute;
      top: 6px; left: 6px;
      background: rgba(0,0,0,.08);
      color: #256a2c;
      width: 22px; height: 22px;
      display: grid; place-items: center;
      border-radius: 6px;
      font-weight: 700;
      font-family: monospace;
      font-size: 14px;
    }

    /* Скрытие/показ по тегам через небольшие эффекты */
    .hidden { display: none; }
    .fade-out { animation: fadeOut .4s forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(.96); } }

    /* Подсказка/мелкая декоративная надпись на фоне */
    .note {
      position: absolute;
      bottom: 8px; right: 8px;
      font-size: 11px;
      color: rgba(0,0,0,.35);
    }

    @media (max-width: 700px) {
      .sticker { height: 150px; }
      .sticker .content { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- Верхняя панель: прогресс и фильтры -->
  <div class="top-bar" aria-label="Панель прогресса и фильтры">
    <div class="badge" id="progressText">Открыто причин: 0 из 101</div>
    <div class="filter-bar" id="filterBar" role="navigation" aria-label="Фильтр по тегам">
      <!-- кнопки будут заполнены через JS -->
    </div>
  </div>

  <!-- Контейнер стикеров -->
  <main class="board" id="board" aria-label="Стикеры с причинами любви">
    <!-- Стикеры будут сгенерированы программно -->
  </main>

  <script>
    // 1) Моковый массив причин (5–10 элементов). Расширяй до 101 по аналогии.
    const reasons = [
      { id: 1, text: "Ты делаешь каждый день ярче и теплее", img: "", tag: "романтика" },
      { id: 2, text: "Ты умеешь смеяться вместе со мной даже в серые дни", img: "", tag: "юмор" },
      { id: 3, text: "Наши путешествия — это наши лучшие истории", img: "", tag: "наши_путешествия" },
      { id: 4, text: "Ты поддерживаешь мечты и вдохновляешь расти", img: "", tag: "поддержка" },
      { id: 5, text: "Мы команда, которая держит друг друга за руку", img: "", tag: "отношения" },
      { id: 6, text: "Твоя забота и внимание к деталям", img: "", tag: "романтика" },
      { id: 7, text: "Ты делаешь дом уютнее каждый день", img: "", tag: "уют" },
      { id: 8, text: "Наши маленькие привычки — наша сила", img: "", tag: "повседневность" },
      { id: 9, text: "С тобой легко быть собой", img: "", tag: "комфорт" },
      { id: 10, text: "Спасибо за твой смех и улыбку", img: "", tag: "признательность" },
    ];

    // Расширяем до желаемого количества (пример: 101)
    // Чтобы быстро протестировать, можно временно оставить 10 элементов.
    // Ниже пример, как можно автоматически продублировать/расширить массив до N:
    const TARGET_COUNT = 101;
    function expandReasons(base, target) {
      const arr = base.slice();
      let i = 0;
      while (arr.length < target) {
        const baseItem = base[i % base.length];
        // Создаем новое копирование с слегка измененным id, текст можно оставить оригинальным или добавить номер
        const copy = {
          id: arr.length + 1,
          text: (baseItem.text) + "",
          img: baseItem.img,
          tag: baseItem.tag
        };
        arr.push(copy);
        i++;
      }
      return arr;
    }
    const fullReasons = expandReasons(reasons, TARGET_COUNT);

    // 2) Навигационная фильтрация по тегам
    const allTags = Array.from(new Set(fullReasons.map(r => r.tag))).filter(t => t);
    // Список тегов для панели фильтров (покажем как кнопки)
    const filterBar = document.getElementById('filterBar');
    const board = document.getElementById('board');

    // Прогресс: считуем сколько открыто (из localStorage)
    const STORAGE_KEY = 'papers_opened';
    const openedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));

    // Состояние фильтра: выбранный тег или null
    let activeTag = null;

    function saveOpened() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(openedSet)));
    }

    // 3) Рендеринг стикеров
    function createSticker(item) {
      // случайный угол наклона в диапазоне -6..6 deg
      const angle = (Math.random() * 12) - 6;
      const colorClasses = ['sticker', 'yellow', 'pink', 'mint', 'blue'];
      // выбор цвета на основе id для разнообразия
      const colorClass = colorClasses[(item.id * 7) % colorClasses.length];
      const sticker = document.createElement('div');
      sticker.className = colorClass + ' sticker';
      sticker.style.setProperty('--angle', angle + 'deg');
      // тень — можно менять для открытых
      sticker.style.setProperty('--shadow', openedSet.has(item.id) ? '0 8px 20px rgba(0,0,0,.15)' : '0 8px 18px rgba(0,0,0,.12)');

      // внутренняя структура flip
      const inner = document.createElement('div');
      inner.className = 'sticker-inner';

      // лица
      const front = document.createElement('div');
      front.className = 'front';
      front.textContent = '#' + item.id;

      const back = document.createElement('div');
      back.className = 'back';
      const imgEl = document.createElement('div');
      imgEl.className = 'img';
      // если есть реальная картинка, можно задать через backgroundImage
      if (item.img) {
        imgEl.style.backgroundImage = `url(${item.img})`;
        imgEl.style.backgroundSize = 'cover';
      } else {
        // заглушка: цветной фон
        imgEl.style.background = '#eee';
        imgEl.style.width = '58px';
        imgEl.style.height = '58px';
      }
      const t = document.createElement('div');
      t.textContent = item.text;
      t.style.fontWeight = '600';
      const small = document.createElement('div');
      small.textContent = 'история #' + item.id;
      small.style.fontSize = '12px';
      small.style.color = '#555';

      back.appendChild(imgEl);
      back.appendChild(t);
      back.appendChild(small);

      inner.appendChild(front);
      inner.appendChild(back);
      sticker.appendChild(inner);

      // кликовая логика: переворот
      let flipped = false;
      sticker.addEventListener('click', () => {
        flipped = !flipped;
        inner.style.transform = 'rotateY(' + (flipped ? 180 : 0) + 'deg)';
        sticker.style.transform += ''; // держим базовый наклон
        // если открыто впервые, пометим как открыто
        if (flipped && !openedSet.has(item.id)) {
          openedSet.add(item.id);
          sticker.classList.add('opened');
          // сохраняем в localStorage
          saveOpened();
          // обновим прогресс
          updateProgress();
        }
        // визуальная отметка открытости
        if (openedSet.has(item.id)) {
          sticker.classList.add('opened');
        }
      });

      // начальная отметка открытости
      if (openedSet.has(item.id)) {
        sticker.classList.add('opened');
        // моментально показать на обратной стороне, чтобы не путать
        inner.style.transform = 'rotateY(180deg)';
        flipped = true;
      }

      // возвращаем элемент
      return sticker;
    }

    // 4) Обновление прогресса на панели
    function updateProgress() {
      const openedCount = openedSet.size;
      const total = fullReasons.length;
      const progressText = document.getElementById('progressText');
      progressText.textContent = `Открыто причин: ${openedCount} из ${total}`;
    }

    // 5) Функция рендера с учётом фильтра
    function renderBoard() {
      board.innerHTML = '';
      // фильтрация: если активный тег, показываем только такие
      const toShow = fullReasons.filter(r => {
        if (!activeTag) return true;
        return r.tag === activeTag;
      });

      // если активирован фильтр, можно добавить эффект fade-out старых элементов
      toShow.forEach(it => {
        const el = createSticker(it);
        board.appendChild(el);
      });
      // если ничего не найдено, показать подсказку
      if (toShow.length === 0) {
        const msg = document.createElement('div');
        msg.textContent = 'Нет стикеров с выбранным тегом. Попробуйте другой тег.';
        msg.style.opacity = .7;
        msg.style.gridColumn = '1 / -1';
        board.appendChild(msg);
      }
    }

    // 6) Инициализация тег-панели
    function renderFilters() {
      filterBar.innerHTML = '';
      // кнопка "Все"
      const btnAll = document.createElement('button');
      btnAll.className = 'filter-btn' + (activeTag === null ? ' active' : '');
      btnAll.textContent = 'Все';
      btnAll.addEventListener('click', () => {
        activeTag = null;
        renderFilters();
        renderBoard();
      });
      filterBar.appendChild(btnAll);

      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (activeTag === tag ? ' active' : '');
        btn.textContent = '#' + tag;
        btn.addEventListener('click', () => {
          activeTag = tag;
          renderFilters();
          renderBoard();
        });
        filterBar.appendChild(btn);
      });
    }

    // 7) Запуск
    // подготовим список тегов
    // (используем полностью расширенный массив fullReasons)
    allTags.length = 0;
    fullReasons.forEach(r => {
      if (r.tag && !allTags.includes(r.tag)) allTags.push(r.tag);
    });

    // initial render
    updateProgress();
    renderFilters();
    renderBoard();

  </script>
</body>
</html>
